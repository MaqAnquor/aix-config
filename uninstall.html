<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sorry to see you go — AI Chat Exporter</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<meta name="robots" content="noindex">
<style>
  :root{--brand:#5B54E0;--ink:#14121d;--muted:#605d72;--soft:#f7f6ff;--line:#e8e6f6;--grad:linear-gradient(135deg,#6D5EF0 0%,#8B5CF6 55%,#A855F7 100%)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--soft);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{max-width:520px;width:100%;background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:0 30px 60px -28px rgba(60,40,160,.3);padding:40px 36px;text-align:center}
  .mark{width:48px;height:48px;border-radius:13px;background:var(--grad);display:inline-flex;align-items:center;justify-content:center;margin-bottom:18px}
  .mark svg{width:26px;height:26px}
  h1{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:10px}
  p.sub{color:var(--muted);margin-bottom:24px}
  .reasons{display:flex;flex-direction:column;gap:10px;text-align:left}
  .reasons a{display:flex;align-items:center;gap:11px;padding:14px 16px;border:1px solid var(--line);border-radius:13px;background:#fff;color:var(--ink);font-weight:550;font-size:15px;transition:border-color .15s,transform .15s,box-shadow .15s;text-decoration:none}
  .reasons a:hover{border-color:#c9c2ef;transform:translateY(-1px);box-shadow:0 8px 20px -12px rgba(60,40,160,.3)}
  .reasons a .ar{margin-left:auto;color:var(--brand);opacity:.5}
  .home{display:inline-block;margin-top:22px;color:var(--brand);font-weight:600;font-size:14.5px;text-decoration:none}
</style>
</head>
<body>
  <div class="card">
    <span class="mark"><svg viewBox="0 0 24 24" fill="none"><rect x="6" y="3" width="12" height="18" rx="2" fill="#fff"/><rect x="9" y="8" width="6" height="1.6" rx=".8" fill="#7C6BF0"/><rect x="9" y="11.2" width="6" height="1.6" rx=".8" fill="#7C6BF0"/></svg></span>
    <h1>Sorry to see you go 👋</h1>
    <p class="sub">If you have 5 seconds, what made you uninstall? It genuinely helps us make it better.</p>
    <div class="reasons">
      <a href="mailto:support@adsit.work?subject=Uninstall%20feedback&body=Reason%3A%20It%20didn't%20work%20on%20a%20site%20I%20use%0A%0AWhich%20site%2Fwhat%20happened%3A%20">It didn't work on a site I use<span class="ar">→</span></a>
      <a href="mailto:support@adsit.work?subject=Uninstall%20feedback&body=Reason%3A%20The%20export%20output%20wasn't%20clean%0A%0AWhat%20was%20wrong%3A%20">The export output wasn't clean<span class="ar">→</span></a>
      <a href="mailto:support@adsit.work?subject=Uninstall%20feedback&body=Reason%3A%20Missing%20a%20feature%20I%20needed%0A%0AWhat%20I%20needed%3A%20">It was missing a feature I needed<span class="ar">→</span></a>
      <a href="mailto:support@adsit.work?subject=Uninstall%20feedback&body=Reason%3A%20Just%20didn't%20need%20it%20anymore">I just didn't need it anymore<span class="ar">→</span></a>
      <a href="mailto:support@adsit.work?subject=Uninstall%20feedback&body=Reason%2Ffeedback%3A%20">Something else<span class="ar">→</span></a>
    </div>
    <a class="home" href="/">← Back to AI Chat Exporter</a>
  </div>
</body>
</html>
