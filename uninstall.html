<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sorry to see you go — AI Chat Exporter</title>
<meta name="robots" content="noindex">
<style>
  :root{--violet:#5B54E0;--ink:#15131f;--muted:#6b6880;--line:#e7e5f5;--card:#f6f5ff}
  body{margin:0;font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink)}
  .wrap{max-width:560px;margin:0 auto;padding:64px 22px;text-align:center}
  h1{font-size:26px;margin:0 0 10px}
  p{color:var(--muted)}
  .reasons{display:flex;flex-direction:column;gap:10px;margin:26px 0 14px;text-align:left}
  .reasons a{display:block;padding:13px 16px;border:1px solid var(--line);border-radius:11px;background:var(--card);text-decoration:none;color:var(--ink);font-weight:500}
  .reasons a:hover{border-color:var(--violet)}
  .home{color:var(--violet);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <h1>Sorry to see you go 👋</h1>
  <p>If you have 5 seconds, what made you uninstall? It genuinely helps us fix it.</p>
  <div class="reasons">
    <a href="mailto:support@adsit.work?subject=Uninstall%20feedback&body=Reason%3A%20It%20didn't%20work%20on%20a%20site%20I%20use%0A%0AWhich%20site%2Fwhat%20happened%3A%20">It didn't work on a site I use</a>

    <a href="mailto:support@adsit.work?subject=Uninstall%20feedback&body=Reason%3A%20Just%20didn't%20need%20it%20anymore">I just didn't need it anymore</a>
    <a href="mailto:support@adsit.work?subject=Uninstall%20feedback&body=Reason%2Ffeedback%3A%20">Something else</a>
  </div>
  <p><a class="home" href="index.html">Back to AI Chat Exporter</a></p>
</div>

</html>
